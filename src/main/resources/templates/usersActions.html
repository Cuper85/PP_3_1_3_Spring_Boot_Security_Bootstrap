<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="./bootstrap-5.3.3-dist/css/bootstrap.css">
</head>

<body class="bg-light">

<div class="bg-dark text-light p-3 d-flex justify-content-between">
  <p class="mb-0"> <strong>admin@mail.ru</strong> with roles: ADMIN USER</p>
  <a class="text-light" href="#">Logout</a>
</div>

<div class="d-flex">
  <nav class="nav flex-column bg-white" style="width: 300px; height: 100vh;">
    <div class="navbar navbar-expand-lg">
      <a class="navbar-brand" href="#">Admin Panel</a>
    </div>
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a class="nav-link active" href="#">Admin</a>
      </li>
      <li>
        <a class="nav-link" href="./user.html">User</a>
      </li>
    </ul>
  </nav>

  <div class="container flex-grow-1 p-4">
    <h1>Admin Panel</h1>
    <ul class="nav nav-tabs mb-4" id="myTab" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button" role="tab" aria-controls="home" aria-selected="true">User table</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab" aria-controls="profile" aria-selected="false">New user</button>
      </li>
    </ul>
    <div class="tab-content" id="myTabContent">
      <div class="tab-pane fade show active" id="home" role="tabpanel" aria-labelledby="home-tab">
        <h4>All Users</h4>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead>
            <tr>
              <th scope="col">Id</th>
              <th scope="col">First name</th>
              <th scope="col">Last name</th>
              <th scope="col">Age</th>
              <th scope="col">Email</th>
              <th scope="col">Role</th>
              <th scope="col">Edit</th>
              <th scope="col">Delete</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="user : ${users}">
              <th th:text="${user.id}">ID</th>
              <td th:text="${user.firstName}">First Name</td>
              <td th:text="${user.lastName}">Last Name</td>
              <td th:text="${user.age}">Age</td>
              <td th:text="${user.email}">Email</td>
              <td>
                <div class="d-inline" th:each="role : ${user.roles}">
                  <span th:text="${#strings.substringAfter(role.value, 'ROLE_')}">Role</span>
                </div>
              </td>
              <td>ADMIN USER</td>
              <td>
                <button type="button" data-bs-toggle="modal" data-bs-target="#editUser" class="btn btn-info"
                  th:data-bs-id="${user.id}"
                  th:data-bs-firstName="${user.firstName}"
                  th:data-bs-lastName="${user.lastName}"
                  th:data-bs-age="${user.age}"
                  th:data-bs-email="${user.email}"
                  th:data-bs-roles="${user.roles}">
                  Edit
                </button>
              </td>

              <td>
                <button type="button" data-bs-toggle="modal" data-bs-target="#deleteUser" class="btn btn-danger"
                        th:data-bs-id="${user.id}"
                        th:data-bs-firstName="${user.firstName}"
                        th:data-bs-lastName="${user.lastName}"
                        th:data-bs-age="${user.age}"
                        th:data-bs-email="${user.email}"
                        th:data-bs-roles="${user.roles}">
                  Delete
                </button>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="tab-pane fade" id="profile" role="tabpanel" aria-labelledby="profile-tab" tabindex="0">
        <h4>Add new users</h4>
        <form action="/admin/users" method="post" class="bg-light p-4 rounded">
          <div class="mb-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          </div>
          <div class="mb-3">
            <label class="form-label" for="newFirstName">First Name</label>
            <input class="form-control" type="text" id="newFirstName" name="firstName" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="newLastName">Last Name</label>
            <input class="form-control" type="text" id="newLastName" name="firstName" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="newAge">Age</label>
            <input class="form-control" type="number" id="newAge" name="age" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="newEmail">Email</label>
            <input class="form-control" type="email" id="newEmail" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="newPassword">Password</label>
            <input class="form-control" type="password" id="newPassword" name="password" required>
          </div>

          <label class="form-label" for="newRoles">Role</label>
          <select class="form-select mb-3" id="newRoles" name="roles" multiple th:size="${#sets.size(allRoles)}" required>
            <option th:each="role: ${allRoles}" th:value="${role.id}" th:text="${#strings.substringAfter(role.value, 'ROLE_')}"></option>
          </select>
          <button type="submit" class="btn btn-success">Add new user</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editUser" tabindex="-1" aria-labelledby="editModal" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title" id="editModal">Edit User</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="editForm" th:method="post">
          <div class="mb-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          </div>
          <div class="mb-3">
            <label class="col-form-label" for="editId">Id</label>
            <input class="form-control" type="text" id="editId" placeholder="ID" name="id" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label" for="editFirstName">First Name</label>
            <input class="form-control" type="text" id="editFirstName" name="firstName" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="editLastName">Last Name</label>
            <input class="form-control" type="text" id="editLastName" name="lastName" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="editAge">Age</label>
            <input class="form-control" type="number" id="editAge" name="age" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="editEmail">Email</label>
            <input class="form-control" type="email" id="editEmail" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="editPassword">Password</label>
            <input class="form-control" type="password" id="editPassword" name="rawPassword">
          </div>
          <label class="form-label" for="editRoles">Role</label>
          <select class="form-select mb-3" id="editRoles" name="roles" multiple th:size="${#sets.size(allRoles)}" required>
            <option th:each="role: ${allRoles}" th:value="${role.id}" th:text="${#strings.substringAfter(role.value, 'ROLE_')}"></option>
          </select>
          <button type="submit" class="btn btn-success">Edit User</button>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" form="editForm" class="btn btn-success">Edit</button>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="deleteUser" tabindex="-1" aria-labelledby="deleteModal" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title" id="deleteModal">Delete User</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="deleteForm" th:method="post">
          <div class="mb-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          </div>
          <div class="mb-3">
            <label class="col-form-label" for="deleteId">Id</label>
            <input class="form-control" type="text" id="deleteId" placeholder="ID" name="id" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label" for="deleteFirstName">First Name</label>
            <input class="form-control" type="text" id="deleteFirstName" name="firstName" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="deleteLastName">Last Name</label>
            <input class="form-control" type="text" id="deleteLastName" name="lastName" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="deleteAge">Age</label>
            <input class="form-control" type="number" id="deleteAge" name="age" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="deleteEmail">Email</label>
            <input class="form-control" type="email" id="deleteEmail" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="deletePassword">Password</label>
            <input class="form-control" type="password" id="deletePassword" name="rawPassword">
          </div>
          <label class="form-label" for="deleteRoles">Role</label>
          <select class="form-select mb-3" id="deleteRoles" name="roles" multiple th:size="${#sets.size(allRoles)}" required>
            <option th:each="role: ${allRoles}" th:value="${role.id}" th:text="${#strings.substringAfter(role.value, 'ROLE_')}"></option>
          </select>
          <button type="submit" class="btn btn-success">Delete User</button>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" form="deleteForm" class="btn btn-danger">Edit</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>

</html>
